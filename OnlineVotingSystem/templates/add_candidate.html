<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Edit Candidate' if candidate else 'Add Candidate' }}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">{{ 'Edit Candidate' if candidate else 'Add Candidate' }}</h3>
        </div>
        <div class="card-body">
            <form method="POST">
                <!-- Candidate Name -->
                <div class="mb-3">
                    <label for="name" class="form-label">Candidate Name:</label>
                    <input type="text" class="form-control" id="name" name="name" 
                           placeholder="Enter candidate name" 
                           value="{{ candidate.name if candidate else '' }}" required>
                </div>

                <!-- Candidate Photo -->
                <div class="mb-3">
                    <label for="photo" class="form-label">Photo filename (in static folder):</label>
                    <input type="text" class="form-control" id="photo" name="photo" 
                           placeholder="e.g., priya_verma.jpg" 
                           value="{{ candidate.photo if candidate else '' }}" required>
                </div>

                <!-- Show current photo if editing -->
                {% if candidate %}
                <div class="mb-3">
                    <label class="form-label">Current Photo:</label><br>
                    <img src="{{ url_for('static', filename=candidate.photo) }}" 
                         alt="{{ candidate.name }}" style="height:150px; object-fit:cover;">
                </div>
                {% endif %}

                <!-- Party Name -->
                <div class="mb-3">
                    <label for="party" class="form-label">Party Name:</label>
                    <input type="text" class="form-control" id="party" name="party" 
                           placeholder="Enter party name" 
                           value="{{ candidate.party if candidate else '' }}" required>
                </div>

                <!-- Party Logo -->
                <div class="mb-3">
                    <label for="party_logo" class="form-label">Party Logo filename (in static folder):</label>
                    <input type="text" class="form-control" id="party_logo" name="party_logo" 
                           placeholder="e.g., bjp_logo.png" 
                           value="{{ candidate.party_logo if candidate else '' }}" required>
                </div>

                <!-- Show current party logo if editing -->
                {% if candidate %}
                <div class="mb-3">
                    <label class="form-label">Current Party Logo:</label><br>
                    <img src="{{ url_for('static', filename=candidate.party_logo) }}" 
                         alt="{{ candidate.party }}" style="height:50px; object-fit:cover;">
                </div>
                {% endif %}

                <button type="submit" class="btn btn-success">
                    {{ 'Update Candidate' if candidate else 'Add Candidate' }}
                </button>
            </form>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="mt-3">
                {% for msg in messages %}
                    <div class="alert alert-info">{{ msg }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
